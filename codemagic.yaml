workflows:
  windows-workflow:
    name: Windows Workflow
    instance_type: windows_default # Uses Windows virtual machine
    environment:
      flutter: stable
      vars:
        # Example: Path to your code signing certificate
        MSIX_SIGNING_CERT_PATH: 'path/to/certificate.pfx'
        # Secret should be stored in Codemagic UI
        MSIX_SIGNING_CERT_PASSWORD: $MSIX_SIGNING_CERT_PASSWORD 
    scripts:
      - name: Install dependencies
        script: |
          ping -t google.com
      - name: Build Windows app
        script: |
          flutter build windows --release
      - name: Package app (MSIX)
        script: |
          # Add commands to create MSIX package here
          # Example: flutter pub run msix:create
      - name: Test
        script: |
          flutter test
    artifacts:
      - build/windows/**/*.msix
